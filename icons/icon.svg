<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- App-Icon nach dem tatsaechlichen Kerndesign: ein grosser, einfarbiger
       runder Button - genau wie im Hellen Modus der App (weisser Hintergrund,
       schwarzer Kreis). Ein sehr sanfter Verlauf gibt dem Kreis eine Spur
       Tiefe, ohne die klare, einfarbige Wirkung zu verlieren. -->
  <defs>
    <radialGradient id="orb" cx="42%" cy="36%" r="75%">
      <stop offset="0%" stop-color="#2b2b30"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#ffffff"/>
  <circle cx="256" cy="256" r="176" fill="url(#orb)"/>
</svg>
