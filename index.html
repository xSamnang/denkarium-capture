<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Denkarium Capture</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="space"></div>
  <div class="dust"></div>

  <main class="stage">
    <div class="lens-halo" id="lensHalo"></div>
    <button class="record-button" id="recordButton" aria-label="Aufnahme starten"></button>
  </main>
  <div class="live-caption" id="liveCaption" hidden></div>

  <button class="icon-btn icon-btn--pencil" id="pencilBtn" aria-label="Text eingeben">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9" />
      <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z" />
    </svg>
  </button>

  <button class="icon-btn icon-btn--paperclip" id="paperclipBtn" aria-label="Datei anhängen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
    </svg>
  </button>
  <input type="file" id="fileInput" hidden accept="image/*,application/pdf,.doc,.docx,.txt" />

  <div class="archive-backdrop" id="archiveBackdrop"></div>
  <aside class="archive-panel" id="archivePanel" aria-hidden="true">
    <div class="archive-panel__header">
      <span>Archiv</span>
      <button class="archive-panel__close" id="archiveClose" aria-label="Schließen">✕</button>
    </div>
    <div class="archive-panel__body">
      <p class="archive-placeholder">Noch keine Notizen – Inhalte kommen in einer späteren Phase.</p>
      <button class="drive-settings-btn" id="driveReconnectBtn" type="button">Google-Drive-Ordner ändern</button>

      <div class="settings-section">
        <p class="settings-label">Farbe innen (Aufnahme-Kreis)</p>
        <div class="swatch-row" id="innerSwatches">
          <button class="swatch" data-color="black" style="background:#000000" title="Schwarz"></button>
          <button class="swatch" data-color="white" style="background:#ffffff" title="Weiß"></button>
          <button class="swatch" data-color="violet" style="background:#7c4dff" title="Violett"></button>
          <button class="swatch" data-color="green" style="background:#2ecc71" title="Grün"></button>
          <button class="swatch" data-color="lightblue" style="background:#4fc3f7" title="Hellblau"></button>
        </div>

        <p class="settings-label">Hintergrund außen</p>
        <div class="swatch-row" id="outerSwatches">
          <button class="swatch swatch--stars" data-color="starfield" title="Sternenhimmel (Standard)">✦</button>
          <button class="swatch" data-color="black" style="background:#000000" title="Schwarz"></button>
          <button class="swatch" data-color="white" style="background:#ffffff" title="Weiß"></button>
          <button class="swatch" data-color="violet" style="background:#7c4dff" title="Violett"></button>
          <button class="swatch" data-color="green" style="background:#2ecc71" title="Grün"></button>
          <button class="swatch" data-color="lightblue" style="background:#4fc3f7" title="Hellblau"></button>
          <button class="swatch swatch--photo" data-color="photo" title="Eigenes Foto">📷</button>
        </div>
        <input type="file" id="bgPhotoInput" hidden accept="image/*" />
      </div>
    </div>
  </aside>

  <div class="pin-gate" id="pinGate" hidden>
    <div class="pin-gate__box">
      <p class="pin-gate__title" id="pinTitle">PIN eingeben</p>
      <p class="pin-gate__error" id="pinError"></p>
      <div class="pin-gate__dots" id="pinDots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-gate__keypad" id="pinKeypad">
        <button type="button" data-key="1">1</button>
        <button type="button" data-key="2">2</button>
        <button type="button" data-key="3">3</button>
        <button type="button" data-key="4">4</button>
        <button type="button" data-key="5">5</button>
        <button type="button" data-key="6">6</button>
        <button type="button" data-key="7">7</button>
        <button type="button" data-key="8">8</button>
        <button type="button" data-key="9">9</button>
        <button type="button" class="pin-gate__cancel" id="pinCancel">Abbrechen</button>
        <button type="button" data-key="0">0</button>
        <button type="button" class="pin-gate__del" id="pinDelete">⌫</button>
      </div>
    </div>
  </div>

  <div class="text-entry" id="textEntry" hidden>
    <div class="text-entry__box">
      <textarea id="textEntryInput" placeholder="Notiz eingeben …"></textarea>
      <div class="text-entry__actions">
        <button id="textEntryCancel" type="button">Abbrechen</button>
        <button id="textEntrySave" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="drive.js"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script>gapiLoaded();</script>
  <script src="appearance.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
